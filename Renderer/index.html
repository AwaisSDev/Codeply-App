<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Codeply</title>
  <link rel="stylesheet" href="../tokens.css">
  <style>
    html, body { height: 100%; }
    body {
      background: transparent;
      overflow: hidden;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .popup {
      width: 384px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-xl);
      box-shadow: var(--sh-lg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      /* Adaptive height — never overflows the window */
      max-height: 98vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 15px 12px;
      -webkit-app-region: drag;
      flex-shrink: 0;
      position: relative;
    }

    .dots { display: flex; gap: 7px; -webkit-app-region: no-drag; pointer-events: auto; position: relative; z-index: 5; }
    .dot {
      width: 12px; height: 12px; border-radius: 50%; border: none;
      cursor: pointer; transition: transform .15s, filter .15s; opacity: 0.95;
      pointer-events: auto; -webkit-app-region: no-drag;
    }
    .dot:hover { opacity: 1; transform: scale(1.12); filter: brightness(1.05); }
    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27c93f; }

    .brand {
      display: flex; align-items: center; gap: 2px; -webkit-app-region: no-drag;
      position: absolute; left: 50%; transform: translateX(-50%);
    }
    .brand img { width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0; }
    .brand-text { display: flex; flex-direction: column; gap: 1px; }
    .brand-name { font-size: 1rem; font-weight: 800; letter-spacing: -.02em; color: var(--ink); line-height: 1; }
    .brand-tag { font-family: var(--mono); font-size: .5rem; font-weight: 700; color: var(--ink-3); letter-spacing: .06em; text-transform: uppercase; line-height: 1; }

    .header-actions { display: flex; gap: 7px; -webkit-app-region: no-drag; }
    .icon-btn {
      width: 30px; height: 30px; border-radius: 9px; border: 1px solid var(--line);
      background: var(--surface); color: var(--ink-2); cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all .15s;
    }
    .icon-btn:hover { background: var(--blue-tint); color: var(--blue); border-color: var(--blue-tint2); }
    .icon-btn svg { width: 15px; height: 15px; }

    /* ── File Target Bar ── */
    .file-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; margin: 2px 15px 0;
      background: var(--green-tint); border: 1px solid #c4ead0;
      border-radius: var(--r-md); flex-shrink: 0;
    }
    .file-path-display {
      flex: 1; font-family: var(--mono); font-size: .78rem; font-weight: 600;
      color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-path-display.active { color: var(--green-600); }
    .browse-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: var(--r-pill);
      border: 1px solid #c4ead0; background: #fff;
      color: var(--ink-2); font-size: .66rem; font-family: var(--mono); font-weight: 700;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .browse-btn:hover { border-color: var(--blue-tint2); color: var(--blue); background: var(--blue-tint); }
    .browse-btn svg { width: 11px; height: 11px; }

    .auto-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: var(--ink-3); transition: background .3s;
    }
    .auto-dot.live {
      background: var(--green);
      box-shadow: 0 0 0 0 rgba(52,168,83,.5);
      animation: autopulse 2s ease-out infinite;
    }
    @keyframes autopulse {
      0% { box-shadow: 0 0 0 0 rgba(52,168,83,.45); }
      70% { box-shadow: 0 0 0 7px rgba(52,168,83,0); }
      100% { box-shadow: 0 0 0 0 rgba(52,168,83,0); }
    }

    /* ── Code Preview ── */
    .preview-wrap {
      position: relative; margin: 12px 15px 0; flex-shrink: 0;
      height: 176px; background: #fbfcff;
      border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden;
    }
    .line-numbers {
      position: absolute; left: 0; top: 0; bottom: 0; width: 32px;
      background: var(--surface-2); border-right: 1px solid var(--line-2);
      display: flex; flex-direction: column; padding: 12px 0;
      z-index: 2; pointer-events: none;
    }
    .line-num {
      font-family: var(--mono); font-size: .6rem; color: var(--ink-3);
      text-align: right; padding-right: 7px; line-height: 1.55rem; height: 1.55rem;
      transition: color .3s;
    }
    .line-num.highlight { color: var(--blue); font-weight: 700; }

    pre#preview {
      margin: 0; padding: 12px 10px 12px 44px;
      color: #353b4a; font-family: var(--mono); font-size: .69rem;
      line-height: 1.55rem; height: 100%; overflow: auto;
      white-space: pre; position: relative; z-index: 1;
    }

    /* ── Apply animation overlays ── */
    .code-line-overlay {
      position: absolute; left: 33px; right: 0; pointer-events: none;
      z-index: 10; transition: opacity 0.4s;
    }
    .overlay-red { background: rgba(234,67,53,.12); border-left: 2px solid var(--red); }
    .overlay-green { background: rgba(52,168,83,.12); border-left: 2px solid var(--green); }

    /* ── Lang badge ── */
    .preview-footer {
      position: absolute; bottom: 6px; right: 6px;
      display: flex; gap: 5px; align-items: center; z-index: 5;
    }
    .lang-badge {
      font-family: var(--mono); font-size: .58rem; color: var(--ink-3);
      background: var(--surface); padding: 2px 8px; border-radius: var(--r-pill);
      border: 1px solid var(--line);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning svg { animation: spin 0.5s ease; }

    /* ── Status / Analysis Result ── */
    .status-box {
      margin: 12px 15px 0; padding: 11px 13px;
      border-radius: var(--r-md); border: 1px solid var(--line);
      background: var(--surface-2); flex-shrink: 0; min-height: 62px;
    }
    .status-row { display: flex; align-items: flex-start; gap: 10px; }
    .status-icon {
      width: 26px; height: 26px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: .8rem; font-family: var(--mono); font-weight: 700;
    }
    .status-icon.idle { background: var(--line-2); color: var(--ink-3); }
    .status-icon.analyzing { background: var(--blue-tint); color: var(--blue); }
    .status-icon.ready { background: var(--green-tint); color: var(--green-600); }
    .status-icon.applying { background: var(--blue-tint); color: var(--blue); }
    .status-icon.error { background: var(--red-tint); color: var(--red-600); }

    .status-text { flex: 1; }
    .status-action { font-size: .9rem; font-weight: 700; color: var(--ink); }
    .status-reason {
      font-size: .78rem; color: var(--ink-2); margin-top: 2px; line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .confidence-bar {
      margin-top: 8px; height: 5px; background: var(--line);
      border-radius: var(--r-pill); overflow: hidden;
    }
    .confidence-fill {
      height: 100%; background: var(--green); border-radius: var(--r-pill);
      transition: width 0.6s ease; width: 0%;
    }
    .confidence-fill.low { background: var(--red); }
    .confidence-fill.mid { background: var(--yellow); }

    /* ── Footer Actions ── */
    .actions {
      display: flex; gap: 9px; padding: 13px 15px;
      margin-top: auto; flex-shrink: 0;
    }
    .btn {
      flex: 1; height: 44px; border: none; border-radius: var(--r-md);
      font-family: var(--sans); font-size: .93rem; font-weight: 700;
      cursor: pointer; transition: all .18s; letter-spacing: -.01em;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn svg { width: 16px; height: 16px; }
    .btn-analyze { background: var(--blue); color: #fff; box-shadow: var(--sh-color); }
    .btn-analyze:hover:not(:disabled) { background: var(--blue-600); transform: translateY(-1px); box-shadow: 0 10px 28px rgba(66,133,244,.34); }
    .btn-apply { background: var(--surface); color: var(--green-600); border: 1.5px solid #bfe7cb; }
    .btn-apply.active { background: var(--green); color: #fff; border-color: var(--green); box-shadow: 0 8px 22px rgba(52,168,83,.3); }
    .btn-apply.active:hover { background: var(--green-600); transform: translateY(-1px); }
    .btn-apply:disabled { opacity: .5; cursor: not-allowed; }
    .btn-analyze:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Model picker dropdown ── */
    .model-dropdown {
      position: absolute; top: 50px; right: 10px; z-index: 200;
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--r-md); box-shadow: var(--sh-lg);
      min-width: 210px; max-width: 270px; overflow: hidden;
      animation: dropIn .14s ease;
    }
    @keyframes dropIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    .model-drop-header {
      padding: 8px 11px 6px; font-size: .6rem; font-family: var(--mono);
      color: var(--ink-3); text-transform: uppercase; letter-spacing: .08em;
      border-bottom: 1px solid var(--line-2);
    }
    .model-opt {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 12px; cursor: pointer; transition: background .12s;
      border-bottom: 1px solid var(--line-2);
    }
    .model-opt:last-child { border-bottom: none; }
    .model-opt:hover { background: var(--surface-2); }
    .model-opt.active { background: var(--blue-tint); }
    .model-opt-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      background: var(--ink-3);
    }
    .model-opt.active .model-opt-dot { background: var(--blue); }
    .model-opt-info { flex: 1; min-width: 0; }
    .model-opt-name {
      font-size: .75rem; font-weight: 600; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .model-opt.active .model-opt-name { color: var(--blue); }
    .model-opt-prov { font-size: .6rem; color: var(--ink-3); font-family: var(--mono); margin-top: 1px; }
    .model-drop-empty { padding: 14px 12px; font-size: .73rem; color: var(--ink-3); text-align: center; line-height: 1.5; }

    /* ── Active model chip ── */
    .model-chip {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .6rem; font-family: var(--mono); color: var(--ink-3);
      background: var(--surface-2); border: 1px solid var(--line-2);
      border-radius: var(--r-pill); padding: 2px 8px; cursor: pointer;
      transition: all .12s; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .model-chip:hover { border-color: var(--blue-tint2); color: var(--blue); background: var(--blue-tint); }
    .model-chip svg { width: 9px; height: 9px; flex-shrink: 0; }

    /* ── Model fallback toast ── */
    .fallback-toast {
      position: fixed; bottom: 80px; left: 12px; right: 12px; z-index: 300;
      background: #fff; border: 1px solid #fcd3b0;
      border-left: 3px solid #f47c30;
      border-radius: 10px; padding: 10px 13px;
      box-shadow: 0 6px 20px rgba(0,0,0,.10);
      animation: toastIn .22s cubic-bezier(.34,1.56,.64,1);
      cursor: pointer;
    }
    .fallback-toast.hiding { animation: toastOut .18s ease forwards; }
    @keyframes toastIn  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { from { opacity:1; transform:translateY(0); }   to { opacity:0; transform:translateY(6px); } }
    .ft-row { display:flex; align-items:flex-start; gap:8px; }
    .ft-icon { font-size:.9rem; flex-shrink:0; margin-top:1px; }
    .ft-body { flex:1; min-width:0; }
    .ft-title { font-size:.73rem; font-weight:700; color:#b34a00; margin-bottom:3px; }
    .ft-detail { font-size:.68rem; color:#777; font-family:var(--mono); line-height:1.4; }
    .ft-used { color:#3a7c3a; font-weight:600; }

    /* ── Scrollbar ── */
    pre::-webkit-scrollbar { width: 4px; height: 4px; }
    pre::-webkit-scrollbar-track { background: transparent; }
    pre::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

    /* ── Typewriter cursor ── */
    .typing-cursor {
      display: inline-block; width: 2px; height: 1em;
      background: var(--green); animation: blink 0.8s step-end infinite;
      vertical-align: text-bottom; margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Spinner icon ── */
    @keyframes rotate { to { transform: rotate(360deg); } }
    .spin-icon { animation: rotate 1s linear infinite; display: inline-block; }

    /* ── Paywall overlay on popup ── */
    .paywall-popup {
      position: absolute; inset: 0; z-index: 100; border-radius: var(--r-xl);
      background: rgba(255,255,255,.97);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 28px; text-align: center; gap: 0;
    }
    .paywall-popup.show { display: flex; }
    .paywall-popup-icon-wrap {
      width: 62px; height: 62px; border-radius: 50%; margin-bottom: 16px;
      background: linear-gradient(135deg,#fff3d4,#ffe5a0);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 4px 14px rgba(251,188,4,.22);
    }
    .paywall-popup-title { font-size: 1.05rem; font-weight: 800; color: var(--ink); letter-spacing: -.02em; margin-bottom: 8px; }
    .paywall-popup-sub { font-size: .78rem; color: var(--ink-2); line-height: 1.55; max-width: 260px; margin-bottom: 20px; }
    .paywall-popup-btn {
      height: 44px; padding: 0 32px; border-radius: var(--r-pill); border: none;
      background: linear-gradient(135deg,#4285F4,#1a6ff0);
      color: #fff; font-size: .86rem; font-weight: 700;
      cursor: pointer; font-family: var(--sans);
      box-shadow: 0 6px 18px rgba(66,133,244,.38);
      transition: transform .15s, box-shadow .15s;
    }
    .paywall-popup-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(66,133,244,.46); }
  </style>
</head>
<body>
  <main class="popup" style="position:relative">
    <!-- Paywall overlay (shown when subscription check fails) -->
    <div class="paywall-popup" id="popupPaywall">
      <div class="paywall-popup-icon-wrap"><span id="popupPaywallIcon">🔒</span></div>
      <div class="paywall-popup-title" id="popupPaywallTitle">Subscription Required</div>
      <div class="paywall-popup-sub" id="popupPaywallSub">Subscribe to continue using Codeply AI.</div>
      <button class="paywall-popup-btn" id="popupPaywallBtn">Open Dashboard</button>
    </div>

    <header class="header">
      <div class="dots">
        <button class="dot red" id="dismissBtn" type="button" title="Hide overlay"></button>
        <button class="dot yellow" id="minimizeBtn" type="button" title="Minimize"></button>
        <button class="dot green" id="dashBtn" type="button" title="Open Dashboard"></button>
      </div>
      <div class="brand">
        <img src="../logos/Logo.png" alt="Codeply" width="26" height="26">
        <div class="brand-text">
          <span class="brand-name">Codeply</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="modelPickBtn" title="Choose model">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="17" y2="18"/>
            <circle cx="17" cy="6" r="2.5"/><circle cx="17" cy="12" r="2.5" fill="currentColor" stroke="none" style="opacity:.25"/>
            <circle cx="20" cy="18" r="2.5"/>
          </svg>
        </button>
        <button class="icon-btn" id="reloadBtn" title="Sync clipboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
            <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
          </svg>
        </button>
      </div>

      <!-- Model picker dropdown (hidden by default) -->
      <div id="modelDropdown" class="model-dropdown" style="display:none">
        <div class="model-drop-header">Select model</div>
        <div id="modelDropList"></div>
      </div>
    </header>

    <!-- File Target -->
    <div class="file-bar">
      <span class="auto-dot" id="autoDot" title="Auto-detecting the file you're editing"></span>
      <div class="file-path-display" id="filePathDisplay">No folder watched — pick one to auto-detect files</div>
      <button class="browse-btn" id="watchBtn" title="Pick the project folder to auto-detect the file you're editing">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Watch
      </button>
      <button class="browse-btn" id="browseBtn" title="Manually pick a single file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        File
      </button>
    </div>

    <!-- Code Preview -->
    <div class="preview-wrap" id="previewWrap">
      <div class="line-numbers" id="lineNumbers"></div>
      <pre id="preview">// Copy code OR type an instruction (e.g. "remove all headings"), then Analyze...</pre>
      <div class="preview-footer">
        <span class="lang-badge" id="langBadge">–</span>
      </div>
    </div>

    <!-- Status / Result -->
    <div class="status-box" id="statusBox">
      <div class="status-row">
        <div class="status-icon idle" id="statusIcon">◈</div>
        <div class="status-text">
          <div class="status-action" id="statusAction">Waiting for code</div>
          <div class="status-reason" id="statusReason">Copy code from anywhere, then hit Analyze</div>
        </div>
      </div>
      <div class="confidence-bar" id="confidenceBar" style="display:none">
        <div class="confidence-fill" id="confidenceFill"></div>
      </div>
      <div id="modelBadge" style="display:none;font-size:0.62rem;font-family:var(--mono);color:var(--ink-3);opacity:0.65;text-align:right;margin-top:3px;padding-right:2px"></div>
      <div style="margin-top:6px;display:flex;align-items:center;gap:6px">
        <span id="activeModelChip" class="model-chip" title="Click to change model">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span id="activeModelLabel">No model</span>
        </span>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-analyze" id="analyzeBtn">Analyze</button>
      <button class="btn btn-apply" id="applyBtn" disabled>Apply</button>
    </div>

  </main>

  <script>
  // Hidden inputs kept for renderer.js backward-compat (reads provider/model/apiKey)
  // Settings are managed via the Dashboard only.
  // Expose _seedSettings so renderer.js can populate these from saved settings.
  window._seedSettings = function(provider, model, apiKey) {
    const p = document.getElementById('provider');
    if (p && provider) p.value = provider;
    const m = document.getElementById('model');
    if (m && model) m.value = model;
    const a = document.getElementById('apiKey');
    if (a && apiKey) a.value = apiKey;
  };
  </script>
  <script>
  // Settings panel removed — provider/model/apiKey managed via Dashboard only.
  // PROVIDER_MODELS kept here only in case renderer.js references it.
  const PROVIDER_MODELS = {
    openrouter: [
      { label: 'GPT-4o mini',              value: 'openai/gpt-4o-mini' },
      { label: 'GPT-4o',                   value: 'openai/gpt-4o' },
      { label: 'Claude 3.5 Sonnet',        value: 'anthropic/claude-3.5-sonnet' },
      { label: 'Claude 3.5 Haiku',         value: 'anthropic/claude-3.5-haiku' },
      { label: 'Gemini Flash 1.5',         value: 'google/gemini-flash-1.5' },
      { label: 'DeepSeek R1',              value: 'deepseek/deepseek-r1' },
      { label: 'Grok 2',                   value: 'x-ai/grok-2-1212' },
      { label: 'Llama 3.1 70B',            value: 'meta-llama/llama-3.1-70b-instruct' },
